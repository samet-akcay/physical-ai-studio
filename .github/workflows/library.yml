name: Library

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch: # run on request (no need for PR)

permissions: {} # No permissions by default on workflow level

env:
  UV_EXCLUDE_NEWER: "7 days"

concurrency:
  group: library-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check-paths:
    name: Check if workflow should run
    runs-on: ${{ github.repository_owner == 'open-edge-platform' && 'overflow' || 'ubuntu-latest' }}
    outputs:
      run_workflow: ${{ steps.check_paths.outputs.run }}
    permissions:
      contents: read
    steps:
      - &harden-runner
        name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          disable-sudo: false
          disable-telemetry: true
          egress-policy: block
          allowed-endpoints: >
            azure.archive.ubuntu.com:80
            cas-server.xethub.hf.co:443
            dl.google.com:443
            download.pytorch.org:443
            download-r2.pytorch.org:443
            esm.ubuntu.com:443
            files.pythonhosted.org:443
            huggingface.co:443
            github.com:443
            index.crates.io:443
            packages.microsoft.com:443
            pypi.org:443
            raw.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            releases.astral.sh:443
            static.crates.io:443
            transfer.xethub.hf.co:443
            us.aws.cdn.hf.co:443
            proxy.golang.org:443
            storage.googleapis.com:443
            nodejs.org:443
            registry.npmjs.org:443

      - &checkout
        name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Check paths
        id: check_paths
        uses: open-edge-platform/geti-ci/actions/check-paths@7e686c1248b3939f8ee8e04e2612da727e379d91
        with:
          files_yaml: |
            test:
              - library/**
              - physicalai/**
              - .github/**

  code-quality:
    runs-on: ${{ github.repository_owner == 'open-edge-platform' && 'overflow' || 'ubuntu-latest' }}
    needs: check-paths
    if: needs.check-paths.outputs.run_workflow == 'true'
    permissions:
      contents: read
    steps:
      - *harden-runner

      - *checkout

      - &set-up-python
        name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: "./library/.python-version"

      - &set-up-uv
        name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.10.4"

      - name: Run prek
        uses: j178/prek-action@bdca6f102f98e2b4c7029491a53dfd366469e33d # v2
        with:
          extra-args: --all-files
          working-directory: library

  unit-tests:
    runs-on: ${{ github.repository_owner == 'open-edge-platform' && 'overflow' || 'ubuntu-latest' }}
    needs: check-paths
    if: needs.check-paths.outputs.run_workflow == 'true'
    permissions:
      contents: read
    steps:
      - *harden-runner

      - *checkout

      - *set-up-python

      - name: Install system dependencies for headless rendering
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1-mesa-dev libgl1-mesa-dev libgles2-mesa-dev

      - *set-up-uv

      - name: Verify lock file
        working-directory: library
        run: uv lock --check

      - name: Install dependencies
        working-directory: library
        run: |
          # Note: We install 'tests', 'pi0', and 'libero' extras, not 'groot' which requires CUDA/flash-attn
          uv sync --frozen --extra tests --extra pi0 --extra libero --extra smolvla --extra cpu

      - name: Run python unit tests
        working-directory: library
        env:
          # Headless rendering for MuJoCo/OpenGL (must be set before any imports)
          MUJOCO_GL: egl
          PYOPENGL_PLATFORM: egl
        run: |
          uv run --no-sync pytest tests/unit

  integration-tests:
    runs-on: [self-hosted, Linux, X64, gpu]
    needs: check-paths
    if: needs.check-paths.outputs.run_workflow == 'true'
    permissions:
      contents: read
    steps:
      - *harden-runner

      - *checkout

      - *set-up-python

      - name: Install system dependencies for headless rendering
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1-mesa-dev libgl1-mesa-dev libgles2-mesa-dev cmake ffmpeg xvfb gcc

      - *set-up-uv

      - name: Verify lock file
        working-directory: library
        run: uv lock --check

      - name: Install dependencies
        working-directory: library
        run: |
          uv sync --frozen --extra tests --extra pi05 --extra libero --extra smolvla --extra cu128

      - name: Run python integration tests
        working-directory: library
        env:
          # Headless rendering for MuJoCo/OpenGL (must be set before any imports)
          MUJOCO_GL: egl
          PYOPENGL_PLATFORM: egl
          # Force GLVND to dispatch EGL to the NVIDIA vendor driver. Mesa's EGL does
          # not support EGL_EXT_platform_device, which MuJoCo's EGL backend needs for
          # headless device rendering on the GPU runner.
          __EGL_VENDOR_LIBRARY_FILENAMES: /usr/share/glvnd/egl_vendor.d/10_nvidia.json
        run: |
          uv run --no-sync pytest tests/integration -m "not slow"

  required-check:
    name: Required Check library
    needs:
      - check-paths
      - code-quality
      - unit-tests
      - integration-tests
    runs-on: ${{ github.repository_owner == 'open-edge-platform' && 'overflow' || 'ubuntu-latest' }}
    env:
      CHECKS: ${{ join(needs.*.result, ' ') }}
    if: always() && !cancelled()
    steps:
      - *harden-runner

      - name: Check jobs results
        run: |
          for check in ${CHECKS}; do
            echo "::notice::check=${check}"
            if [[ "$check" != "success" && "$check" != "skipped" ]]; then
              echo "::error ::Required status checks failed. They must succeed before this pull request can be merged."
              exit 1
            fi
          done
