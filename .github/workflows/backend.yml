name: Backend
on:
  push:
    branches:
      - "main"
  pull_request:

permissions: {} # No permissions by default on workflow level

jobs:
  code-quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read # to checkout code
    steps:
      - &checkout
        name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - &set-up-python
        name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: "./application/backend/.python-version"

      - &set-up-uv
        name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: "0.10.4"

      - name: Run prek
        uses: j178/prek-action@53276d8b0d10f8b6672aa85b4588c6921d0370cc # v2
        with:
          extra-args: --all-files
          working-directory: application/backend

  unit-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read # to checkout code
    steps:
      - *checkout

      - *set-up-python

      - *set-up-uv

      - name: Prepare venv and install Python dependencies
        working-directory: application/backend
        run: |
          uv lock --check
          uv sync --frozen --extra cpu --extra tests

      - name: Check source code with mypy
        working-directory: application/backend
        run: |
          uv run mypy . --config-file=pyproject.toml

      - name: Run python tests
        working-directory: application/backend
        run: |
          uv run pytest tests
