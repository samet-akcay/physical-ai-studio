name: TruffleHog Secret Scan

permissions: {} # No permissions by default on workflow level

on:
  workflow_dispatch:
  push:
  pull_request:

concurrency:
  group: backend-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    runs-on: ${{ github.repository_owner == 'open-edge-platform' && 'overflow' || 'ubuntu-latest' }}
    permissions:
      contents: read
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          disable-sudo: true
          disable-telemetry: true
          egress-policy: block
          allowed-endpoints: >
            api.sonarcloud.io:443
            app.eraser.io:443
            ghcr.io:443
            github.com:443
            pkg-containers.githubusercontent.com:443
            sonarcloud.io:443
            api.github.com:443
            auth.docker.io:443
            registry.npmjs.org:443
            upload.pypi.org:443
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Secret Scanning
        uses: trufflesecurity/trufflehog@d411fff7b8879a62509f3fa98c07f247ac089a51 # v3.95.5
        with:
          extra_args: --results=verified,unknown --exclude-paths=.trufflehogignore
