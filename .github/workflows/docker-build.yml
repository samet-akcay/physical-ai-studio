name: Docker Build

on:
  pull_request:
    branches: [main]

permissions: {} # No permissions by default on workflow level

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-paths:
    name: Check if workflow should run
    runs-on: ubuntu-latest
    outputs:
      run_workflow: ${{ steps.check_paths.outputs.run }}
    permissions:
      contents: read
    steps:
      - &checkout
        name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check paths
        id: check_paths
        uses: open-edge-platform/geti-ci/actions/check-paths@7e686c1248b3939f8ee8e04e2612da727e379d91
        with:
          files_yaml: |
            test:
              - library/**
              - physicalai/**
              - application/**
              - .github/actions/docker-build/**
              - .github/workflows/docker-build.yml

  build:
    name: Build (${{ matrix.device }})
    needs: check-paths
    if: needs.check-paths.outputs.run_workflow == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read # Checkout code
      packages: write # Push/pull registry build cache on GHCR
      pull-requests: write # Post image size comment

    strategy:
      fail-fast: false
      matrix:
        device: [cpu, xpu, cuda]

    steps:
      - *checkout

      - name: Log in to Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/open-edge-platform/physical-ai-studio-${{ matrix.device }}
          tags: |
            type=sha
            type=ref,event=pr

      - name: Build Docker image
        id: docker_build
        uses: ./.github/actions/docker-build
        with:
          device: ${{ matrix.device }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Fork PRs cannot write packages to the upstream org, so disable
          # cache export to avoid 403 errors from GHCR.
          cache-write: ${{ github.event.pull_request.head.repo.full_name == github.repository }}

      - name: Smoke-test docker image
        env:
          IMAGE: ${{ steps.docker_build.outputs.image-name }}
          DEVICE: ${{ matrix.device }}
        run: |
          CONTAINER_NAME="physical-ai-studio-healthcheck-${DEVICE}"

          echo "Starting container from ${IMAGE} ..."
          docker run -d --name "${CONTAINER_NAME}" -p 7860:7860 "${IMAGE}"

          # Wait up to 60 seconds for the /health endpoint to respond
          echo "Waiting for /health endpoint ..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:7860/api/health; then
              echo ""
              echo "Backend health check passed!"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Backend health check failed after 60 seconds."
              docker logs "${CONTAINER_NAME}"
              docker rm -f "${CONTAINER_NAME}" > /dev/null 2>&1
              exit 1
            fi
            sleep 2
          done

          # Verify the UI is being served
          TEST_URL="http://localhost:7860"
          EXPECTED_TITLE="Physical AI Studio"
          echo "Checking HTML title..."

          HTML_CONTENT=$(curl -sf $TEST_URL)
          if echo "$HTML_CONTENT" | grep -q "<title>.*$EXPECTED_TITLE.*</title>"; then
            echo "✅ HTML title check passed - found: $EXPECTED_TITLE"
          else
            echo "❌ HTML title check failed - expected title '$EXPECTED_TITLE' not found"
            echo "Actual HTML content:"
            echo "$HTML_CONTENT"
            docker logs "${CONTAINER_NAME}"
            docker rm -f "${CONTAINER_NAME}" > /dev/null 2>&1
            exit 1
          fi

          docker rm -f "${CONTAINER_NAME}" > /dev/null 2>&1

      - name: Get Docker image size
        id: image_size
        env:
          IMAGE: ${{ steps.docker_build.outputs.image-name }}
        run: |
          SIZE_BYTES=$(docker image inspect "${IMAGE}" --format='{{.Size}}')
          SIZE_MB=$(awk "BEGIN {printf \"%.1f\", ${SIZE_BYTES} / 1024 / 1024}")
          SIZE_GB=$(awk "BEGIN {printf \"%.2f\", ${SIZE_BYTES} / 1024 / 1024 / 1024}")
          echo "bytes=${SIZE_BYTES}" >> "$GITHUB_OUTPUT"
          echo "human=${SIZE_MB} MB (${SIZE_GB} GB)" >> "$GITHUB_OUTPUT"

      - name: Post image size comment
        # Skip this step for PRs from forks as the do not have write permissions
        if: github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          DEVICE: ${{ matrix.device }}
          SIZE_HUMAN: ${{ steps.image_size.outputs.human }}
        run: |
          MARKER="<!-- docker-image-size -->"
          HEADER="${MARKER}
          ### 🐳 Docker image sizes

          | Device | Size |
          |--------|------|"
          NEW_ROW="| \`${DEVICE}\` | ${SIZE_HUMAN} |"

          # Find the shared comment
          COMMENT_ID=$(gh api \
            "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
            --paginate --jq ".[] | select(.body | startswith(\"${MARKER}\")) | .id" \
          | head -n1)

          if [ -n "${COMMENT_ID}" ]; then
            # Read the current body, replace or append the device row
            EXISTING=$(gh api "repos/${GITHUB_REPOSITORY}/issues/comments/${COMMENT_ID}" --jq .body)
            if echo "${EXISTING}" | grep -q "| \`${DEVICE}\`"; then
              BODY=$(echo "${EXISTING}" | sed "s/| \`${DEVICE}\` |.*/${NEW_ROW}/")
            else
              BODY="${EXISTING}
          ${NEW_ROW}"
            fi
            gh api \
              --method PATCH \
              "repos/${GITHUB_REPOSITORY}/issues/comments/${COMMENT_ID}" \
              -f body="${BODY}"
          else
            BODY="${HEADER}
          ${NEW_ROW}"
            gh pr comment "${PR_NUMBER}" --body "${BODY}"
          fi

  required-check:
    name: Required Check docker-build
    needs:
      - check-paths
      - build
    runs-on: ubuntu-latest
    env:
      CHECKS: ${{ join(needs.*.result, ' ') }}
    if: always() && !cancelled()
    steps:
      - name: Check jobs results
        run: |
          for check in ${CHECKS}; do
            echo "::notice::check=${check}"
            if [[ "$check" != "success" && "$check" != "skipped" ]]; then
              echo "::error ::Required status checks failed. They must succeed before this pull request can be merged."
              exit 1
            fi
          done
