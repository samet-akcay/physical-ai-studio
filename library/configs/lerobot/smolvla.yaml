# SmolVLA Policy Training Configuration
# Train SmolVLA using LeRobot's implementation
#
# Usage:
#   physicalai fit --config configs/lerobot/smolvla.yaml
#
# Override parameters:
#   physicalai fit --config configs/lerobot/smolvla.yaml --model.max_state_dim 64

model:
  class_path: physicalai.policies.lerobot.SmolVLA
  init_args:
    # Steps for input and output
    n_obs_steps: 1
    chunk_size: 50
    n_action_steps: 50

    # State dimensions
    max_state_dim: 32
    max_action_dim: 32

    # Image preprocessing
    resize_imgs_with_padding: [512, 512]

    # Aloha specific parameters
    empty_cameras: 0
    adapt_to_pi_aloha: False
    use_delta_joint_actions_aloha: False

    # Tokenizer and decoding
    tokenizer_max_length: 48
    num_steps: 10
    use_cache: True

    # Finetuning settings
    freeze_vision_encoder: True
    train_expert_only: True
    train_state_proj: True

    # Training presets
    optimizer_lr: 1e-4
    optimizer_betas: [0.9, 0.95]
    optimizer_eps: 1e-8
    optimizer_weight_decay: 1e-10
    optimizer_grad_clip_norm: 10
    scheduler_warmup_steps: 1_000
    scheduler_decay_steps: 30_000
    scheduler_decay_lr: 2.5e-6

    # VLM/VLA model parameters
    vlm_model_name: "HuggingFaceTB/SmolVLM2-500M-Video-Instruct"
    load_vlm_weights: true
    add_image_special_tokens: False
    attention_mode: "cross_attn"
    prefix_length: -1
    pad_language_to: "longest"
    num_expert_layers: -1
    num_vlm_layers: 16
    self_attn_every_n_layers: 2
    expert_width_multiplier: 0.75

    # Positional encoding
    min_period: 4e-3
    max_period: 4.0

data:
  class_path: physicalai.data.lerobot.LeRobotDataModule
  init_args:
    repo_id: "lerobot/svla_so100_stacking"
    train_batch_size: 64
    data_format: "lerobot" # Output format: "lerobot" (flattened dict) or "physicalai" (Observation)

trainer:
  max_epochs: 200
  accelerator: gpu
  devices: 1
  precision: 32
  log_every_n_steps: 10
  check_val_every_n_epoch: 10
