# X-VLA Policy Training Configuration
# Train X-VLA (Florence-2 backbone) policy using LeRobot's implementation.
#
# Usage:
#   physicalai fit --config configs/lerobot/xvla.yaml
#
# Override parameters:
#   physicalai fit --config configs/lerobot/xvla.yaml --model.chunk_size 32
#
# Note on florence_config:
#   XVLAConfig.get_florence_config() requires `florence_config` to contain
#   both `vision_config` and `text_config` keys (a bare `florence_config: {}`
#   raises ValueError). The nested mappings themselves may be empty -- e.g.
#   `text_config: {}` falls back to BART-large defaults. This file spells out
#   the Florence-2 DaViT vision tower defaults explicitly for reproducibility.

model:
  class_path: physicalai.policies.lerobot.XVLA
  init_args:
    # Core architecture
    chunk_size: 16
    n_action_steps: 16
    n_obs_steps: 1
    dtype: "float32" # Options: float32, bfloat16

    # X-VLA transformer
    hidden_size: 1024
    depth: 24
    num_heads: 16
    mlp_ratio: 4.0
    num_domains: 30
    len_soft_prompts: 32
    dim_time: 32
    max_len_seq: 512
    use_hetero_proj: false

    # Action decoding
    action_mode: "ee6d" # End-effector 6-DoF action parameterization
    num_denoising_steps: 10
    use_proprio: true
    max_state_dim: 32
    max_action_dim: 20

    # Vision / image preprocessing
    empty_cameras: 0
    freeze_vision_encoder: false
    freeze_language_encoder: false
    train_policy_transformer: true
    train_soft_prompts: true

    # Tokenizer
    tokenizer_name: "facebook/bart-large"
    tokenizer_max_length: 64
    tokenizer_padding_side: "right"
    pad_language_to: "max_length"

    # Florence-2 backbone config (both vision_config and text_config keys
    # are required; nested mappings may be empty to use Florence-2 defaults)
    florence_config:
      vision_config:
        drop_path_rate: 0.1
        patch_size: [7, 3, 3, 3]
        patch_stride: [4, 2, 2, 2]
        patch_padding: [3, 1, 1, 1]
        patch_prenorm: [false, true, true, true]
        enable_checkpoint: false
        dim_embed: [256, 512, 1024, 2048]
        num_heads: [8, 16, 32, 64]
        num_groups: [8, 16, 32, 64]
        depths: [1, 1, 9, 1]
        window_size: 12
        projection_dim: 1024
        visual_temporal_embedding:
          type: COSINE
          max_temporal_embeddings: 100
        image_pos_embed:
          type: learned_abs_2d
          max_pos_embeddings: 1000
        image_feature_source: [spatial_avg_pool, temporal_avg_pool]
      text_config: {}

    # Optimization
    optimizer_lr: 1.0e-4
    optimizer_weight_decay: 0.0
    optimizer_grad_clip_norm: 10.0
    optimizer_soft_prompt_lr_scale: 1.0
    scheduler_warmup_steps: 1000
    scheduler_decay_steps: 30000
    scheduler_decay_lr: 2.5e-6

data:
  class_path: physicalai.data.lerobot.LeRobotDataModule
  init_args:
    repo_id: "lerobot/aloha_sim_transfer_cube_human"
    train_batch_size: 4 # Reduced for memory efficiency
    data_format: "lerobot"
    # X-VLA uses action_delta_indices=range(chunk_size); n_obs_steps=1 means no
    # observation offsets are needed. The default repo_id is 50 fps -> step = 0.02 s,
    # so 16 consecutive frames span [0.0, 0.30] s.
    delta_timestamps:
      action:
        [
          0.0,
          0.02,
          0.04,
          0.06,
          0.08,
          0.10,
          0.12,
          0.14,
          0.16,
          0.18,
          0.20,
          0.22,
          0.24,
          0.26,
          0.28,
          0.30,
        ]

trainer:
  max_epochs: 100
  accelerator: gpu
  devices: 1
  precision: bf16-mixed
  log_every_n_steps: 10
  check_val_every_n_epoch: 10
