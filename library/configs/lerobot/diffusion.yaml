# LeRobot Diffusion Policy Configuration
# Train Diffusion Policy using LeRobot's implementation
#
# Usage:
#   physicalai fit --config configs/lerobot/diffusion.yaml
#
# Override parameters:
#   physicalai fit --config configs/lerobot/diffusion.yaml --model.horizon 32

model:
  class_path: physicalai.policies.lerobot.Diffusion
  init_args:
    # Core architecture - horizon must match len(delta_timestamps["action"])
    n_obs_steps: 2
    horizon: 16
    n_action_steps: 8
    drop_n_last_frames: 7

    # Vision backbone
    vision_backbone: "resnet18"
    crop_shape: [84, 84]
    crop_is_random: true
    use_group_norm: true
    spatial_softmax_num_keypoints: 32

    # U-Net architecture
    down_dims: [512, 1024, 2048]
    kernel_size: 5
    n_groups: 8
    diffusion_step_embed_dim: 128
    use_film_scale_modulation: true

    # Noise scheduler
    noise_scheduler_type: "DDPM"
    num_train_timesteps: 100
    beta_schedule: "squaredcos_cap_v2"
    prediction_type: "epsilon"

    # Optimization
    optimizer_lr: 1.0e-4
    optimizer_weight_decay: 1.0e-6
    scheduler_name: "cosine"
    scheduler_warmup_steps: 500

data:
  class_path: physicalai.data.lerobot.LeRobotDataModule
  init_args:
    repo_id: "lerobot/aloha_sim_transfer_cube_human"
    train_batch_size: 8
    data_format: "lerobot" # Output format: "lerobot" (flattened dict) or "physicalai" (Observation)
    # Delta timestamps MUST match the policy's obs/action horizons AND the dataset's fps.
    # The default repo_id (lerobot/aloha_sim_transfer_cube_human) is 50 fps -> step = 0.02 s.
    # Observation: n_obs_steps=2 consecutive frames ending at t=0 -> offsets [-0.02, 0.0].
    # Action:       horizon=16 consecutive frames starting at t=-0.02 -> 16 offsets in 0.02 s steps.
    delta_timestamps:
      observation.images.top: [-0.02, 0.0]
      observation.state: [-0.02, 0.0]
      action:
        [
          -0.02,
          0.0,
          0.02,
          0.04,
          0.06,
          0.08,
          0.10,
          0.12,
          0.14,
          0.16,
          0.18,
          0.20,
          0.22,
          0.24,
          0.26,
          0.28,
        ]

trainer:
  max_epochs: 100
  precision: 16-mixed
  log_every_n_steps: 10
